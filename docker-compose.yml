services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: campus
      POSTGRES_PASSWORD: campus
      POSTGRES_DB: campus
    ports:
      - "5433:5432"
    volumes:
      - campus_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campus"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # apply migrations, then start the API
    command: sh -c "pnpm --filter @campus/api exec prisma migrate deploy && node apps/api/dist/main.js"
    environment:
      DATABASE_URL: postgresql://campus:campus@postgres:5432/campus?schema=public
      API_PORT: "4000"
      API_HOST: 0.0.0.0
      CORS_ORIGIN: ${CAMPUS_DOCKER_WEB_ORIGIN:-http://localhost:3100,http://localhost:3200}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: pnpm --filter @campus/web exec next start -p 3100 -H 0.0.0.0
    ports:
      # Keep Docker separate from the local Next.js dev server, which uses 3100.
      - "${CAMPUS_DOCKER_WEB_PORT:-3200}:3100"
    depends_on:
      - api

volumes:
  campus_pg_data:
