services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: campus
      POSTGRES_PASSWORD: campus
      POSTGRES_DB: campus
    ports:
      - "5432:5432"
    volumes:
      - campus_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campus"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  campus_pg_data:
